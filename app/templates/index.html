<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmony — Document Extraction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fb; color: #1a1a2e; min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 48px 20px; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: #6b7280; font-size: 0.9rem; margin-bottom: 32px; }

    /* Upload area */
    .upload-area { border: 2px dashed #d1d5db; border-radius: 12px; padding: 40px 24px; text-align: center; background: #fff; transition: border-color 0.2s, background 0.2s; cursor: pointer; position: relative; }
    .upload-area:hover, .upload-area.dragover { border-color: #6366f1; background: #f5f3ff; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-text { font-size: 0.95rem; color: #6b7280; }
    .upload-text strong { color: #6366f1; }
    .file-name { margin-top: 8px; font-size: 0.85rem; color: #111827; font-weight: 500; }
    .formats { font-size: 0.75rem; color: #9ca3af; margin-top: 6px; }

    /* Button */
    .btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 20px; padding: 10px 28px; font-size: 0.9rem; font-weight: 500; color: #fff; background: #6366f1; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .spinner { display: none; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    .btn.loading .spinner { display: inline-block; }
    .btn.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Processing banner */
    .processing { margin-top: 28px; padding: 18px 20px; border-radius: 12px; background: #eef2ff; border: 1px solid #c7d2fe; display: none; }
    .processing.active { display: flex; align-items: center; gap: 12px; animation: fadeIn 0.3s ease; }
    .processing .pulse { width: 10px; height: 10px; background: #6366f1; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .processing .label { font-size: 0.88rem; color: #4338ca; font-weight: 500; }
    .processing .job-id { font-size: 0.75rem; color: #818cf8; font-family: monospace; }

    /* Result card */
    .result { margin-top: 28px; border-radius: 12px; background: #fff; border: 1px solid #e5e7eb; overflow: hidden; animation: fadeIn 0.3s ease; display: none; }
    .result.visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .result-header { padding: 14px 20px; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .result-header.success { background: #ecfdf5; color: #065f46; }
    .result-header.partial { background: #fffbeb; color: #92400e; }
    .result-header.error   { background: #fef2f2; color: #991b1b; }
    .result-body { padding: 16px 20px; }

    /* Data table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th { text-align: left; padding: 6px 0; color: #6b7280; font-weight: 500; width: 40%; }
    .data-table td { padding: 6px 0; color: #111827; }
    .data-table tr + tr { border-top: 1px solid #f3f4f6; }
    .null-val { color: #d1d5db; font-style: italic; }

    /* Errors list */
    .errors-section { margin-top: 12px; }
    .errors-section h3 { font-size: 0.8rem; font-weight: 600; color: #991b1b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
    .error-item { font-size: 0.83rem; padding: 8px 12px; background: #fef2f2; border-radius: 6px; margin-bottom: 4px; color: #7f1d1d; }
    .error-item .error-field { font-weight: 600; }
    .error-item .error-type { color: #991b1b; font-size: 0.75rem; background: #fee2e2; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }

    /* Metadata */
    .meta { margin-top: 12px; font-size: 0.75rem; color: #9ca3af; display: flex; gap: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Harmony</h1>
    <p class="subtitle">Upload an income document to extract structured data</p>

    <form id="uploadForm">
      <div class="upload-area" id="dropZone">
        <input type="file" name="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.webp,.tiff,.tif">
        <div class="upload-icon">📄</div>
        <p class="upload-text">Drop a file here or <strong>browse</strong></p>
        <p class="formats">PDF, PNG, JPEG, WEBP, TIFF — max {{ max_size_mb }} MB</p>
        <p class="file-name" id="fileName"></p>
      </div>
      <button type="submit" class="btn" id="submitBtn" disabled>
        <span class="btn-label">Extract Data</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="processing" id="processingBanner">
      <div class="pulse"></div>
      <div>
        <div class="label">Extracting data…</div>
        <div class="job-id" id="jobIdLabel"></div>
      </div>
    </div>

    <div class="result" id="resultCard">
      <div class="result-header" id="resultHeader"></div>
      <div class="result-body" id="resultBody"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('uploadForm');
    const processingBanner = document.getElementById('processingBanner');
    const jobIdLabel = document.getElementById('jobIdLabel');
    const resultCard = document.getElementById('resultCard');
    const resultHeader = document.getElementById('resultHeader');
    const resultBody = document.getElementById('resultBody');

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) {
        fileName.textContent = fileInput.files[0].name;
        submitBtn.disabled = false;
      }
    });

    ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); }));
    ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); }));
    dropZone.addEventListener('drop', ev => {
      fileInput.files = ev.dataTransfer.files;
      fileInput.dispatchEvent(new Event('change'));
    });

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      if (!fileInput.files.length) return;

      // Reset UI
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      resultCard.classList.remove('visible');
      processingBanner.classList.add('active');
      jobIdLabel.textContent = '';

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      try {
        // Submit file → get job ID
        const submitResp = await fetch('/ui/extract', { method: 'POST', body: formData });
        if (!submitResp.ok) {
          const err = await submitResp.json();
          showError(err.errors ? err.errors[0].message : (err.detail || 'Upload failed'));
          return;
        }
        const { job_id } = await submitResp.json();
        jobIdLabel.textContent = 'Job ' + job_id;

        // Poll until done
        await pollJob(job_id);
      } catch (e) {
        showError(e.message || 'Network error');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
        processingBanner.classList.remove('active');
      }
    });

    async function pollJob(jobId) {
      const POLL_INTERVAL = 800;
      const MAX_POLLS = 120; // ~96 seconds max
      for (let i = 0; i < MAX_POLLS; i++) {
        await sleep(POLL_INTERVAL);
        const resp = await fetch('/ui/jobs/' + jobId);
        if (!resp.ok) { showError('Failed to check job status'); return; }
        const job = await resp.json();
        if (job.status === 'completed') { renderResult(job.result); return; }
        if (job.status === 'failed') { showError(job.error || 'Extraction failed'); return; }
        // still processing — keep polling
      }
      showError('Extraction timed out — please try again');
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function renderResult(result) {
      const status = result.status;
      resultHeader.className = 'result-header ' + status;
      if (status === 'success') resultHeader.textContent = '✅ Extraction Successful';
      else if (status === 'partial') resultHeader.textContent = '⚠️ Partial Extraction';
      else resultHeader.textContent = '❌ Extraction Failed';

      let html = '';

      // Data table
      if (result.data) {
        const d = result.data;
        html += '<table class="data-table">';
        html += row('Employer', d.employer_name);
        html += row('Employee', d.employee_name);
        html += row('Gross Income', d.gross_income != null ? '$' + Number(d.gross_income).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) : null);
        html += row('Net Income', d.net_income != null ? '$' + Number(d.net_income).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) : null);
        html += row('Pay Frequency', d.pay_frequency);
        if (d.income_period) html += row('Income Period', d.income_period.start_date + ' — ' + d.income_period.end_date);
        html += row('Document Type', d.document_type);
        html += row('Currency', d.currency);
        if (d.confidence_notes && d.confidence_notes.length) html += row('Notes', d.confidence_notes.join(', '));
        html += '</table>';
      }

      // Errors
      if (result.errors && result.errors.length) {
        html += '<div class="errors-section"><h3>Issues</h3>';
        result.errors.forEach(err => {
          html += '<div class="error-item">';
          if (err.field) html += '<span class="error-field">' + esc(err.field) + '</span>';
          html += '<span class="error-type">' + esc(err.error_type) + '</span>';
          html += ' — ' + esc(err.message);
          html += '</div>';
        });
        html += '</div>';
      }

      // Metadata
      if (result.metadata) {
        const m = result.metadata;
        html += '<div class="meta">';
        if (m.model_used) html += '<span>Model: ' + esc(m.model_used) + '</span>';
        if (m.processing_time_ms != null) html += '<span>Time: ' + m.processing_time_ms + 'ms</span>';
        html += '</div>';
      }

      resultBody.innerHTML = html;
      resultCard.classList.add('visible');
    }

    function showError(msg) {
      resultHeader.className = 'result-header error';
      resultHeader.textContent = '❌ Error';
      resultBody.innerHTML = '<div class="error-item">' + esc(msg) + '</div>';
      resultCard.classList.add('visible');
    }

    function row(label, value) {
      const display = value != null ? esc(String(value)) : '<span class="null-val">not found</span>';
      return '<tr><th>' + esc(label) + '</th><td>' + display + '</td></tr>';
    }

    function esc(s) {
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }
  </script>
</body>
</html>
